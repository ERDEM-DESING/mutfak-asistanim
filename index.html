<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Mutfak Asistanim</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🍳 Mutfak Asistanim</h1>
        
        <section id="suggestor">
            <h2>🍲 Bugün Ne Pişirsem?</h2>
            <button onclick="yemekOner()">Günün Menüsünü Seç</button>
            <div id="menuResult"></div>
        </section>

        <section id="dessert" style="margin-top: 20px; border-top: 1px solid #eee; padding-top: 20px;">
            <h2>🍰 Tatlı Da Yesek Mi?</h2>
            <button onclick="tatliOner()" style="background-color: #e91e63;">Rastgele Tatlı Seç</button>
            <p id="dessertResult" style="margin-top: 10px; font-weight: bold; color: #ad1457;"></p>
        </section>

        <section id="converter" style="margin-top: 20px; border-top: 1px solid #eee; padding-top: 20px;">
            <h2>⚖️ Ölçek Dönüştürücü</h2>
            <input type="number" id="amount" placeholder="Miktar girin...">
            <select id="unit">
                <option value="ml">Mililitre (ml)</option>
                <option value="gr">Gram (gr) - Un</option>
            </select>
            <button onclick="donustur()">Dönüştür</button>
            <p id="resultText">Sonuç burada görünecek.</p>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
